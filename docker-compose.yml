services:
  subtractor:
    build: .
    image: subtractor:latest
    ports:
      - "8080:8080"
    environment:
      SUBTRACTOR_USERNAME: ${SUBTRACTOR_USERNAME:-admin}
      # Value comes from the host environment or an untracked .env file —
      # never commit a real password here.
      SUBTRACTOR_PASSWORD: ${SUBTRACTOR_PASSWORD}
      SUBTRACTOR_RETENTION_DAYS: "14"
      # Set to "true" when serving over HTTPS (e.g. behind a reverse proxy).
      SUBTRACTOR_SECURE_COOKIES: "false"
    volumes:
      - subtractor-data:/data
    restart: unless-stopped

volumes:
  subtractor-data:
